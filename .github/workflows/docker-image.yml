name: Build and Push Docker Image

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: 06-github-actions-cicd
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        working-directory: 06-github-actions-cicd
        env:
          PYTHONPATH: ${{ github.workspace }}/06-github-actions-cicd
        run: python -m pytest test_app.py

      - name: Log in to ACR
        run: echo "${{ secrets.ACR_PASSWORD }}" | docker login acrredlab123.azurecr.io -u "${{ secrets.ACR_USERNAME }}" --password-stdin

      - name: Build Docker image
        working-directory: 06-github-actions-cicd
        run: docker build -t acrredlab123.azurecr.io/ci-cd-lab:${{ github.sha }} .

      - name: Push Docker image
        run: docker push acrredlab123.azurecr.io/ci-cd-lab:${{ github.sha }}
